USER-SUPPLIED VALUES:
alertmanager:
  alertmanagerSpec:
    storage: {}
    tolerations:
    - effect: NoSchedule
      key: node-role.kubernetes.io/control-plane
      operator: Exists
fullnameOverride: ""
grafana:
  adminPassword: admin
  enabled: true
  resources:
    limits:
      cpu: 500m
      memory: 700Mi
    requests:
      cpu: 100m
      memory: 128Mi
  service:
    nodePort: 32000
    type: NodePort
kubeApiServer:
  enabled: true
kubeControllerManager:
  enabled: true
  endpoints:
  - 151.115.151.134
  - 151.115.151.130
  - 151.115.151.133
  service:
    enabled: true
    port: 10257
    targetPort: 10257
  serviceMonitor:
    enabled: true
    https: true
    insecureSkipVerify: true
kubeEtcd:
  enabled: true
  endpoints:
  - 151.115.151.134
  - 151.115.151.130
  - 151.115.151.133
  service:
    enabled: true
    port: 2379
    targetPort: 2379
  serviceMonitor:
    caFile: /etc/prometheus/secrets/etcd-client-cert/ca.crt
    certFile: /etc/prometheus/secrets/etcd-client-cert/client.crt
    enabled: true
    insecureSkipVerify: false
    keyFile: /etc/prometheus/secrets/etcd-client-cert/client.key
    scheme: https
kubeProxy:
  enabled: true
  endpoints:
  - 151.115.151.134
  - 151.115.151.130
  - 151.115.151.133
  - 151.115.151.131
kubeScheduler:
  enabled: true
  endpoints:
  - 151.115.151.134
  - 151.115.151.130
  - 151.115.151.133
  service:
    enabled: true
    port: 10259
    targetPort: 10259
  serviceMonitor:
    enabled: true
    https: true
    insecureSkipVerify: true
kubeStateMetrics:
  enabled: true
kubelet:
  enabled: true
  serviceMonitor:
    https: true
nameOverride: ""
nodeExporter:
  enabled: true
prometheus:
  prometheusSpec:
    podMonitorSelectorNilUsesHelmValues: false
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 200m
        memory: 512Mi
    retention: 15d
    ruleSelectorNilUsesHelmValues: false
    secrets:
    - etcd-client-cert
    serviceMonitorSelectorNilUsesHelmValues: false
    storageSpec: {}
    tolerations:
    - effect: NoSchedule
      key: node-role.kubernetes.io/control-plane
      operator: Exists
