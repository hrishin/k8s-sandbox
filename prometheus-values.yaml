# kube-prometheus-stack values for self-managed kubeadm cluster
# Cluster: 3 CP nodes (151.115.151.134, .130, .133) + 1 worker (151.115.151.131)

nameOverride: ""
fullnameOverride: ""

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    # Mount the etcd client cert secret so ServiceMonitor TLS config can reference it
    secrets:
      - etcd-client-cert

    # No StorageClass in this cluster — use emptyDir (data survives pod, not node)
    storageSpec: {}

    retention: 15d

    # Scrape all ServiceMonitors/PodMonitors regardless of namespace label
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi

    # Allow Prometheus to be scheduled on control plane nodes
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

# ── etcd ─────────────────────────────────────────────────────────────────────
kubeEtcd:
  enabled: true
  endpoints:
    - 151.115.151.134
    - 151.115.151.130
    - 151.115.151.133
  service:
    enabled: true
    port: 2379
    targetPort: 2379
  serviceMonitor:
    enabled: true
    scheme: https
    insecureSkipVerify: false
    # Certs are mounted from the etcd-client-cert secret via prometheusSpec.secrets
    # Mount path: /etc/prometheus/secrets/etcd-client-cert/
    caFile:   /etc/prometheus/secrets/etcd-client-cert/ca.crt
    certFile: /etc/prometheus/secrets/etcd-client-cert/client.crt
    keyFile:  /etc/prometheus/secrets/etcd-client-cert/client.key

# ── kube-controller-manager ───────────────────────────────────────────────────
# Now listens on 0.0.0.0:10257 (patched from 127.0.0.1)
kubeControllerManager:
  enabled: true
  endpoints:
    - 151.115.151.134
    - 151.115.151.130
    - 151.115.151.133
  service:
    enabled: true
    port: 10257
    targetPort: 10257
  serviceMonitor:
    enabled: true
    https: true
    insecureSkipVerify: true  # uses self-signed cert signed by cluster CA

# ── kube-scheduler ────────────────────────────────────────────────────────────
# Now listens on 0.0.0.0:10259 (patched from 127.0.0.1)
kubeScheduler:
  enabled: true
  endpoints:
    - 151.115.151.134
    - 151.115.151.130
    - 151.115.151.133
  service:
    enabled: true
    port: 10259
    targetPort: 10259
  serviceMonitor:
    enabled: true
    https: true
    insecureSkipVerify: true

# ── kube-proxy ────────────────────────────────────────────────────────────────
kubeProxy:
  enabled: true
  endpoints:
    - 151.115.151.134
    - 151.115.151.130
    - 151.115.151.133
    - 151.115.151.131

# ── kube-apiserver ────────────────────────────────────────────────────────────
# Fronted by the Scaleway LB at 51.159.134.48:6443 — discovered via Service/Endpoints
kubeApiServer:
  enabled: true

# ── kubelet ───────────────────────────────────────────────────────────────────
kubelet:
  enabled: true
  serviceMonitor:
    https: true

# ── Grafana ───────────────────────────────────────────────────────────────────
grafana:
  enabled: true
  adminPassword: admin   # change after install
  service:
    type: NodePort
    nodePort: 32000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ── Alertmanager ─────────────────────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    storage: {}
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

# ── node-exporter ─────────────────────────────────────────────────────────────
nodeExporter:
  enabled: true

# ── kube-state-metrics ────────────────────────────────────────────────────────
kubeStateMetrics:
  enabled: true
